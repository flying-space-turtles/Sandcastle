# Standalone compose file for the template vulnerable web application.
#
# This is *not* the top-level Sandcastle scaffold compose. It runs the
# vulnerable app on its own so contributors can iterate without bringing up
# the rest of the CTF infrastructure.
#
# Usage:
#   docker compose up -d --build
#   curl http://localhost:8080/health
#   docker compose down -v        # tear down and drop seeded data

services:
  vuln:
    build:
      context: .
    image: sandcastle/example-vuln:latest
    container_name: sandcastle-example-vuln
    environment:
      - TEAM_ID=${TEAM_ID:-0}
      - TEAM_NAME=${TEAM_NAME:-Standalone}
      - SERVICE_PORT=8080
      - SECRET_KEY=${SECRET_KEY:-sandcastle-dev-secret-change-me}
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - vuln-data:/app/data
    restart: unless-stopped

volumes:
  vuln-data:
