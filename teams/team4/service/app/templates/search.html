{% extends "base.html" %}
{% block body %}
  <h2>Search public notes</h2>
  <form method="get">
    <label>query <input name="q" value="{{ q or '' }}"></label>
    <button type="submit">search</button>
  </form>
  {% if q %}
    <p class="muted">results for &ldquo;{{ q }}&rdquo;: {{ notes|length }}</p>
    {% for n in notes %}
      <div class="note">
        <h3>{{ n.title }}</h3>
        <p>{{ n.body }}</p>
        <p class="muted">by {{ n.author }}</p>
      </div>
    {% endfor %}
  {% endif %}
{% endblock %}
