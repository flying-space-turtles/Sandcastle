{% extends "base.html" %}
{% block body %}
  <p>Welcome to <strong>TurtleNotes</strong>, the official notes service for {{ team_name }}.</p>
  {% if not notes %}
    <p class="muted">No public notes yet.</p>
  {% endif %}
  {% for n in notes %}
    <div class="note">
      <h3>{{ n.title }}</h3>
      <p>{{ n.body }}</p>
      <p class="muted">posted by {{ n.author }} at {{ n.created_at }}</p>
    </div>
  {% endfor %}
{% endblock %}
