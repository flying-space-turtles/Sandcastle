{% extends "base.html" %}
{% block body %}
  <h2>{{ current_user }}'s notes</h2>
  <p><a href="{{ url_for('notes_new') }}">+ new note</a></p>
  {% if not notes %}
    <p class="muted">no notes yet</p>
  {% endif %}
  {% for n in notes %}
    <div class="note">
      <h3>{{ n.title }} {% if n.is_secret %}<span class="muted">(secret)</span>{% endif %}</h3>
      <p>{{ n.body }}</p>
      <p class="muted">created {{ n.created_at }} &middot; id={{ n.id }}</p>
    </div>
  {% endfor %}
{% endblock %}
