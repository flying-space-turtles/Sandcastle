name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python quality tools
        run: pip install -r requirements-dev.txt

      - name: Check Python formatting
        run: |
          mkdir -p ci-logs
          ruff format --check . 2>&1 | tee ci-logs/ruff-format.log

      - name: Lint all Python source
        run: ruff check . 2>&1 | tee ci-logs/ruff-check.log

      - name: Upload Python quality logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-quality-logs
          path: ci-logs/
          if-no-files-found: ignore

  shell-quality:
    name: Shell quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: |
          mkdir -p ci-logs
          bash -n scripts/*.sh scripts/lib/*.sh bot/*.sh tests/*.sh \
            2>&1 | tee ci-logs/bash-syntax.log

      - name: Run ShellCheck
        run: |
          shellcheck -x -P scripts/lib $(git ls-files '*.sh') \
            2>&1 | tee ci-logs/shellcheck.log

      - name: Verify executable scripts
        run: |
          result=0
          while IFS= read -r script; do
            if [[ ! -x "${script}" ]]; then
              echo "ERROR: ${script} is not executable"
              result=1
            fi
          done < <(git ls-files '*.sh')
          exit "${result}"

      - name: Upload shell quality logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shell-quality-logs
          path: ci-logs/
          if-no-files-found: ignore

  bot-tests:
    name: Bot / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: config
            test: tests/bot_config_test.py
          - layer: planners
            test: tests/planners_test.py
          - layer: model-planner
            test: tests/model_planner_test.py
          - layer: actions
            test: tests/actions_test.py
          - layer: api-validation
            test: tests/bot_api_test.py
          - layer: runtime
            test: tests/bot_test.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ${{ matrix.layer }} tests
        run: |
          mkdir -p ci-logs
          python3 -B "${{ matrix.test }}" 2>&1 | tee "ci-logs/${{ matrix.layer }}.log"

      - name: Upload bot test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-${{ matrix.layer }}-logs
          path: ci-logs/
          if-no-files-found: ignore

  firewall-tests:
    name: Firewall / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: parsing-and-events
            command: python3 -B tests/firewall_test.py
          - layer: host-preflight
            command: ./tests/firewall_preflight_test.sh
          - layer: network-smoke
            command: ./tests/network_smoke_test.sh
    steps:
      - uses: actions/checkout@v4

      - name: Run ${{ matrix.layer }} tests
        run: |
          mkdir -p ci-logs
          ${{ matrix.command }} 2>&1 | tee "ci-logs/${{ matrix.layer }}.log"

      - name: Upload firewall test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firewall-${{ matrix.layer }}-logs
          path: ci-logs/
          if-no-files-found: ignore

  checker-tests:
    name: Checker / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: runner-contract
            test_class: CheckerRunnerTest
          - layer: example-service-plugin
            test_class: TurtleNotesCheckerTest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/example-vuln/app/requirements.txt

      - name: Install service test dependencies
        run: pip install -r services/example-vuln/app/requirements.txt

      - name: Run ${{ matrix.layer }} tests
        run: |
          mkdir -p ci-logs
          python3 -B tests/checker_test.py "${{ matrix.test_class }}" \
            2>&1 | tee "ci-logs/${{ matrix.layer }}.log"

      - name: Upload checker test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checker-${{ matrix.layer }}-logs
          path: ci-logs/
          if-no-files-found: ignore

  gameserver-tests:
    name: Gameserver / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: state
            command: python3 -B tests/gameserver_test.py GameserverTest
          - layer: submissions
            command: python3 -B tests/gameserver_test.py SubmissionServiceTest
          - layer: api
            command: python3 -B tests/gameserver_test.py GameserverHTTPTest
          - layer: round-engine
            command: python3 -B tests/round_engine_test.py
          - layer: scoring
            command: python3 -B tests/scoring_test.py
          - layer: telemetry
            command: python3 -B tests/telemetry_test.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ${{ matrix.layer }} tests
        run: |
          mkdir -p ci-logs
          ${{ matrix.command }} 2>&1 | tee "ci-logs/${{ matrix.layer }}.log"

      - name: Upload gameserver test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gameserver-${{ matrix.layer }}-logs
          path: ci-logs/
          if-no-files-found: ignore

  infrastructure-tests:
    name: Infrastructure / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: doctor
            command: ./tests/doctor_test.sh
          - layer: generation
            command: ./tests/setup_test.sh
          - layer: lifecycle
            command: ./tests/arena_test.sh
          - layer: staging-dind-smoke
            command: ./tests/staging_dind_smoke_test.sh
          - layer: staging-deploy
            command: ./tests/staging_deploy_test.sh
    steps:
      - uses: actions/checkout@v4

      - name: Run ${{ matrix.layer }} tests
        run: |
          mkdir -p ci-logs
          ${{ matrix.command }} 2>&1 | tee "ci-logs/${{ matrix.layer }}.log"

      - name: Upload infrastructure test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-${{ matrix.layer }}-logs
          path: ci-logs/
          if-no-files-found: ignore

  compose-validation:
    name: Compose generation and validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate two-team topology
        run: |
          mkdir -p ci-logs
          ./scripts/setup.sh --teams 2 2>&1 | tee ci-logs/setup.log

      - name: Verify committed generation is current
        run: git diff --exit-code -- docker-compose.yml config/arena.env

      - name: Validate every Compose variant
        run: ./scripts/validate-compose.sh 2>&1 | tee ci-logs/compose-validation.log

      - name: Upload Compose validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-validation-logs
          path: ci-logs/
          if-no-files-found: ignore

  dockerfile-validation:
    name: Dockerfile validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Dockerfile variants
        run: ./scripts/setup.sh --teams 2

      - name: Prepare Dockerfile logs
        run: mkdir -p ci-logs

      - name: Lint every Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          recursive: true
          failure-threshold: error
          no-color: true
          output-file: ci-logs/hadolint.log

      - name: Upload Dockerfile validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dockerfile-validation-logs
          path: ci-logs/
          if-no-files-found: ignore

  visualizer-build:
    name: Visualizer build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visualizer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visualizer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build visualizer
        run: npm run build 2>&1 | tee visualizer-build.log

      - name: Upload visualizer build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visualizer-build-log
          path: visualizer/visualizer-build.log
          if-no-files-found: ignore

  reduced-end-to-end:
    name: Required reduced end-to-end match
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run reduced competition lifecycle
        run: |
          mkdir -p ci-logs
          ./tests/integration_test.sh --local 2>&1 | tee ci-logs/reduced-end-to-end.log

      - name: Upload reduced match logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reduced-end-to-end-logs
          path: ci-logs/
          if-no-files-found: ignore

  integration-test-docker:
    name: Full Docker integration (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Apply firewall bridge-netfilter preflight
        run: sudo ./scripts/firewall-preflight.sh --apply
        continue-on-error: true
        id: preflight

      - name: Run full Docker integration test
        if: steps.preflight.outcome == 'success'
        run: ./tests/integration_test.sh
        env:
          SC005_TIMEOUT: "180"

      - name: Upload full integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-integration-logs
          path: sc005-logs/
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy staging VPS
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'deploy:staging') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    needs:
      - python-quality
      - shell-quality
      - bot-tests
      - firewall-tests
      - checker-tests
      - gameserver-tests
      - infrastructure-tests
      - compose-validation
      - dockerfile-validation
      - visualizer-build
      - reduced-end-to-end
    environment: staging
    concurrency:
      group: staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Deploy PR head to staging
        run: ./scripts/staging-deploy.sh
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
          STAGING_OPERATOR_TOKEN: ${{ secrets.STAGING_OPERATOR_TOKEN }}
          STAGING_CHECKER_SECRET: ${{ secrets.STAGING_CHECKER_SECRET }}
          STAGING_TEAM_TOKEN_PATTERN: ${{ secrets.STAGING_TEAM_TOKEN_PATTERN }}
          STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT || 22 }}
          STAGING_DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH || '/opt/sandcastle-staging' }}
          SANDCASTLE_STAGING_TEAMS: ${{ vars.SANDCASTLE_STAGING_TEAMS || 2 }}
          SANDCASTLE_STAGING_TIMEOUT: ${{ vars.SANDCASTLE_STAGING_TIMEOUT || 240 }}
