name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

  python-lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check scripts/

      - name: Lint
        run: ruff check scripts/

  gen-compose:
    name: Validate compose generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate docker-compose.yml
        run: python3 scripts/gen_compose.py 3

      - name: Verify generated file matches committed version
        run: git diff --exit-code docker-compose.yml

  docker-lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: teams/ssh/Dockerfile

  compose-config:
    name: Validate docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose syntax
        run: docker compose -f docker-compose.yml config --quiet
        env:
          VULN_IMAGE: placeholder:latest

  scripts-executable:
    name: Verify scripts are executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check executable permissions
        run: |
          status=0
          for f in scripts/*.sh; do
            if [ ! -x "$f" ]; then
              echo "ERROR: $f is not executable"
              status=1
            fi
          done
          exit $status
