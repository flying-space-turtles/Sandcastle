name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check scripts/

      - name: Lint
        run: ruff check scripts/

  visualizer-build:
    name: Build visualizer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visualizer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visualizer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build visualizer
        run: npm run build

  gen-compose:
    name: Validate compose generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate docker-compose.yml
        run: ./scripts/setup.sh

      - name: Verify committed generation is current
        run: git diff --exit-code -- docker-compose.yml config/arena.env

  docker-lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/ssh/Dockerfile
          failure-threshold: error

  compose-config:
    name: Validate docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose syntax
        run: docker compose -f docker-compose.yml config --quiet

  scripts-executable:
    name: Verify scripts are executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check executable permissions
        run: |
          status=0
          for f in scripts/*.sh tests/*.sh; do
            if [ ! -x "$f" ]; then
              echo "ERROR: $f is not executable"
              status=1
            fi
          done
          exit $status

  doctor-tests:
    name: Test arena doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fixture-driven doctor tests
        run: ./tests/doctor_test.sh

  setup-tests:
    name: Test arena generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fixture-driven setup tests
        run: ./tests/setup_test.sh

  arena-lifecycle-tests:
    name: Test arena lifecycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fixture-driven lifecycle tests
        run: ./tests/arena_test.sh

  firewall-tests:
    name: Test firewall enforcement contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run firewall unit tests
        run: python3 -B tests/firewall_test.py

      - name: Run host preflight tests
        run: ./tests/firewall_preflight_test.sh

      - name: Run network smoke fixture tests
        run: ./tests/network_smoke_test.sh

  integration-test-local:
    name: "Integration test (local fixture mode)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fixture-driven integration test
        run: ./tests/integration_test.sh --local

  integration-test-docker:
    name: "Integration test (full Docker)"
    runs-on: ubuntu-latest
    # Full Docker mode requires bridge-nf-call-iptables and a Linux Docker host.
    # Run only on pushes to main; PRs use the faster fixture mode above.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Apply firewall bridge-netfilter preflight
        run: sudo ./scripts/firewall-preflight.sh --apply
        # Some GitHub-hosted runners do not expose the bridge sysctl.
        # If the preflight cannot be applied the full-Docker test is skipped
        # rather than failing CI, since the fixture job already covered
        # control-flow correctness.
        continue-on-error: true
        id: preflight

      - name: Run full Docker integration test
        if: steps.preflight.outcome == 'success'
        run: ./tests/integration_test.sh
        env:
          SC005_TIMEOUT: "180"

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sc005-failure-logs
          path: sc005-logs/
          if-no-files-found: ignore
