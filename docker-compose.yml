# Auto-generated by scripts/gen_compose.py — edit that script, not this file.
#
# Top-level orchestrator for the local Attack & Defense CTF simulation.
# Every team gets two containers (SSH gateway + vulnerable notes service)
# attached to the shared ctf-network bridge at 10.10.0.0/16.

networks:
  ctf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
          gateway: 10.10.0.1

volumes:
  gameserver-data:

  team1-data:
  team2-data:
  team3-data:

services:
  gameserver:
    build: ./gameserver
    image: ad-ctf/gameserver
    container_name: gameserver
    hostname: gameserver
    networks:
      ctf-network:
        ipv4_address: 10.10.0.2
    ports:
      - "8080:8080"
    environment:
      - NUM_TEAMS=3
      - TICK_DURATION=30
      - FLAG_EXPIRY_ROUNDS=5
      - GAMESERVER_DB=/app/data/gameserver.sqlite
      - AUTO_START=true
    volumes:
      - gameserver-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on: {}
  team1-vuln:
    build: ./services/notes-service
    image: ad-ctf/notes-service
    container_name: team1-vuln
    hostname: team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.1.3
    environment:
      - TEAM_NAME=Team 1
      - NOTES_ADMIN_TOKEN=admin-1
    volumes:
      - team1-data:/app/data
    restart: unless-stopped
  team2-vuln:
    image: ad-ctf/notes-service
    container_name: team2-vuln
    hostname: team2-vuln
    depends_on:
      - team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.2.3
    environment:
      - TEAM_NAME=Team 2
      - NOTES_ADMIN_TOKEN=admin-2
    volumes:
      - team2-data:/app/data
    restart: unless-stopped
  team3-vuln:
    image: ad-ctf/notes-service
    container_name: team3-vuln
    hostname: team3-vuln
    depends_on:
      - team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.3.3
    environment:
      - TEAM_NAME=Team 3
      - NOTES_ADMIN_TOKEN=admin-3
    volumes:
      - team3-data:/app/data
    restart: unless-stopped
  team1-ssh:
    build:
      context: ./teams/ssh
      args:
        TEAM_USER: ctfuser
        TEAM_PASS: team1pass
        TEAM_NAME: team1
    image: ad-ctf/ssh-gateway
    container_name: team1-ssh
    hostname: team1
    networks:
      ctf-network:
        ipv4_address: 10.10.1.2
    ports:
      - "2201:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/notes-service:/home/ctfuser/service:ro
    cap_add:
      - NET_ADMIN
    depends_on:
      - team1-vuln
    restart: unless-stopped
  team2-ssh:
    image: ad-ctf/ssh-gateway
    container_name: team2-ssh
    hostname: team2
    networks:
      ctf-network:
        ipv4_address: 10.10.2.2
    ports:
      - "2202:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/notes-service:/home/ctfuser/service:ro
    environment:
      - TEAM_USER=ctfuser
      - TEAM_NAME=team2
    cap_add:
      - NET_ADMIN
    depends_on:
      - team2-vuln
      - team1-ssh
    restart: unless-stopped
  team3-ssh:
    image: ad-ctf/ssh-gateway
    container_name: team3-ssh
    hostname: team3
    networks:
      ctf-network:
        ipv4_address: 10.10.3.2
    ports:
      - "2203:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/notes-service:/home/ctfuser/service:ro
    environment:
      - TEAM_USER=ctfuser
      - TEAM_NAME=team3
    cap_add:
      - NET_ADMIN
    depends_on:
      - team3-vuln
      - team1-ssh
    restart: unless-stopped
