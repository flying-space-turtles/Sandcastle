      args:
        TEAM_ID: "1"
        TEAM_NAME: "team1"
        TEAM_USER: "team1"
        TEAM_PASS: "team1pass"
        TEAM_UID: "1000"
    image: sandcastle/team1-ssh:latest
    container_name: team1-ssh
    hostname: team1-ssh
    depends_on:
      - team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.1.2
    ports:
