      ctf-network:
        ipv4_address: 10.10.1.3
    environment:
      TEAM_ID: "1"
      TEAM_NAME: "Team 1"
      SERVICE_PORT: "8080"
      SECRET_KEY: "sandcastle-team1-dev-secret"
    volumes:
      - team1-data:/app/data
    restart: unless-stopped

