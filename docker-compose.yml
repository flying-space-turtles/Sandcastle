# Auto-generated by ./scripts/setup.sh. Re-run that script instead of editing this file.
#
# Local Attack & Defense CTF topology:
#   - one SSH gateway container per team
#   - one vulnerable service container per team
#   - deterministic addresses on 10.10.0.0/16

name: sandcastle

networks:
  ctf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
          gateway: 10.10.0.1

volumes:
  team1-data:
  team2-data:
  team3-data:
  team4-data:
  team5-data:
  team6-data:

services:
  team1-vuln:
    build:
      context: ./teams/team1/service
    image: sandcastle/team1-vuln:latest
    container_name: team1-vuln
    hostname: team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.1.3
    environment:
      TEAM_ID: "1"
      TEAM_NAME: "Team 1"
      SERVICE_PORT: "8080"
      SECRET_KEY: "sandcastle-team1-dev-secret"
    volumes:
      - team1-data:/app/data
    restart: unless-stopped

  team1-ssh:
    build:
      context: ./teams/team1
      dockerfile: ssh/Dockerfile
    image: sandcastle/team1-ssh:latest
    container_name: team1-ssh
    hostname: team1-ssh
    depends_on:
      - team1-vuln
    networks:
      ctf-network:
        ipv4_address: 10.10.1.2
    ports:
      - "2201:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

