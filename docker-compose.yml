        ipv4_address: 10.10.1.3
    environment:
      - TEAM_ID=1
      - TEAM_NAME=Team 1
      - SERVICE_PORT=${VULN_PORT:-8080}
    volumes:
      - team1-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "${TEAM_CPU_LIMIT:-2}"
          memory: "${TEAM_MEM_LIMIT:-2g}"
        reservations:
